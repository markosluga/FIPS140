# NGINX configuration with Lua integration for field-level encryption
# Requirements: 1.1, 1.2, 4.2, 5.5

worker_processes 1;
error_log /var/log/nginx/error.log info;

events {
    worker_connections 1024;
}

http {
    include /usr/local/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;

    # Logging format for demo visibility
    log_format demo_format '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'rt=$request_time';

    access_log /var/log/nginx/access.log demo_format;

    # DNS resolver for Docker service discovery
    resolver 127.0.0.11 valid=30s;

    # Configure Lua module paths
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
    lua_package_cpath "/usr/local/openresty/lualib/?.so;;";

    # Shared dictionary for storing metrics (optional for future use)
    lua_shared_dict metrics 10m;

    # Initialize encryption module at startup
    # Requirement 4.2: Load field selectors from configuration file
    init_by_lua_block {
        -- Load encryption module
        encryption = require "encryption_module"
        
        -- Load configuration from file
        local config, err = encryption.load_config("/etc/nginx/config.yaml")
        
        if not config then
            ngx.log(ngx.ERR, "FATAL: Failed to load configuration: ", err)
            ngx.log(ngx.ERR, "Demo system cannot start without valid configuration")
            os.exit(1)
        end
        
        ngx.log(ngx.NOTICE, "==============================================")
        ngx.log(ngx.NOTICE, "Field-Level Encryption Demo - NGINX Started")
        ngx.log(ngx.NOTICE, "==============================================")
        ngx.log(ngx.NOTICE, "KMS Region: ", config.kms.region)
        ngx.log(ngx.NOTICE, "KMS Key ID: ", config.kms.key_id)
        ngx.log(ngx.NOTICE, "Configured Fields: ", #config.encryption.fields)
        
        for i, field in ipairs(config.encryption.fields) do
            ngx.log(ngx.NOTICE, "  ", i, ". ", field.path, " - ", field.description or "")
        end
        
        ngx.log(ngx.NOTICE, "==============================================")
    }

    server {
        listen 80;
        server_name localhost;

        # Serve static files for Demo Web UI
        # Requirement 5.5: Demo Web UI interface
        location / {
            root /usr/local/openresty/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API endpoint - encrypt request, proxy to backend, decrypt response
        # Requirements: 1.1 (encrypt), 1.2 (decrypt)
        location /api/ {
            client_body_buffer_size 1m;
            client_max_body_size 1m;

            content_by_lua_block {
                local cjson = require "cjson"
                local http = require "resty.http"

                local method = ngx.req.get_method()
                local content_type = ngx.req.get_headers()["Content-Type"]
                local body = nil

                -- Encrypt request body if JSON POST/PUT
                if (method == "POST" or method == "PUT") and
                   content_type and string.find(content_type, "application/json", 1, true) then

                    ngx.req.read_body()
                    body = ngx.req.get_body_data()

                    if body then
                        ngx.log(ngx.INFO, "Processing request for encryption...")
                        local encrypted_body, err = encryption.encrypt_request_fields(body)
                        if not encrypted_body then
                            ngx.log(ngx.ERR, "Encryption failed: ", err)
                            ngx.status = 500
                            ngx.header["Content-Type"] = "application/json"
                            ngx.say(cjson.encode({error = "Encryption failed", detail = err}))
                            return
                        end
                        body = encrypted_body
                    end
                end

                -- Proxy to backend
                local httpc = http.new()
                httpc:set_timeout(10000)

                local res, err = httpc:request_uri("http://backend:5000" .. ngx.var.request_uri, {
                    method = method,
                    body = body,
                    headers = {
                        ["Content-Type"] = "application/json",
                        ["Content-Length"] = body and #body or 0,
                        ["X-Real-IP"] = ngx.var.remote_addr,
                    },
                })

                if not res then
                    ngx.log(ngx.ERR, "Backend request failed: ", err)
                    ngx.status = 502
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({error = "Backend unavailable", detail = err}))
                    return
                end

                -- Build response with metrics if we encrypted
                local metrics = ngx.ctx.encrypt_metrics
                if metrics then
                    local ok, backend_data = pcall(cjson.decode, res.body)
                    if ok then
                        local response = {
                            encrypted_payload = ngx.ctx.encrypted_payload or {},
                            backend_response  = backend_data,
                            metrics = {
                                kms_endpoint     = metrics.kms_endpoint,
                                kms_region       = metrics.kms_region,
                                kms_key_id       = metrics.kms_key_id,
                                encrypt_time_ms  = metrics.encrypt_time_ms or 0,
                                decrypt_time_ms  = 0,
                                fields_encrypted = metrics.fields_encrypted or {},
                            }
                        }
                        ngx.status = res.status
                        ngx.header["Content-Type"] = "application/json"
                        ngx.say(cjson.encode(response))
                        ngx.log(ngx.INFO, "Injected metrics into response: encrypt=",
                                metrics.encrypt_time_ms, "ms, fields=",
                                #(metrics.fields_encrypted or {}))
                        return
                    end
                end

                -- Pass through response as-is
                ngx.status = res.status
                for k, v in pairs(res.headers) do
                    ngx.header[k] = v
                end
                ngx.say(res.body)
            }

            log_by_lua_block {
                local method = ngx.req.get_method()
                local uri = ngx.var.uri
                local status = ngx.var.status
                local request_time = ngx.var.request_time

                ngx.log(ngx.INFO, "=== Request Complete ===")
                ngx.log(ngx.INFO, "Method: ", method)
                ngx.log(ngx.INFO, "URI: ", uri)
                ngx.log(ngx.INFO, "Status: ", status)
                ngx.log(ngx.INFO, "Request Time: ", request_time, "s")
                ngx.log(ngx.INFO, "========================")
            }
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 '{"status": "healthy", "service": "nginx-encryption-proxy"}\n';
            add_header Content-Type application/json;
        }

        # Decrypt endpoint - takes ciphertext fields and returns plaintext
        location /api/decrypt {
            client_body_buffer_size 1m;
            client_max_body_size 1m;

            content_by_lua_block {
                local cjson = require "cjson"
                local http = require "resty.http"

                ngx.req.read_body()
                local body = ngx.req.get_body_data()
                if not body then
                    ngx.status = 400
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({error = "No body"}))
                    return
                end

                local ok, data = pcall(cjson.decode, body)
                if not ok then
                    ngx.status = 400
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({error = "Invalid JSON"}))
                    return
                end

                -- Decrypt each field that looks like KMS ciphertext
                local decrypted = {}
                local total_ms = 0
                local last_meta = nil
                local httpc = http.new()
                httpc:set_timeout(10000)

                for k, v in pairs(data) do
                    if type(v) == "string" and string.sub(v, 1, 5) == "AQICA" then
                        local res, err = httpc:request_uri("http://kms-bridge:5001/decrypt", {
                            method = "POST",
                            body = cjson.encode({ciphertext = v}),
                            headers = {["Content-Type"] = "application/json"}
                        })
                        if res and res.status == 200 then
                            local ok2, r = pcall(cjson.decode, res.body)
                            if ok2 then
                                decrypted[k] = r.plaintext
                                total_ms = total_ms + (r.duration_ms or 0)
                                last_meta = r
                            else
                                decrypted[k] = v
                            end
                        else
                            decrypted[k] = v
                        end
                    else
                        decrypted[k] = v
                    end
                end

                local response = {
                    decrypted_payload = decrypted,
                    metrics = {
                        kms_endpoint    = last_meta and last_meta.endpoint or ("https://kms." .. encryption.config.kms.region .. ".amazonaws.com/"),
                        kms_region      = encryption.config.kms.region,
                        kms_key_id      = last_meta and last_meta.key_id or encryption.config.kms.key_id,
                        decrypt_time_ms = total_ms,
                    }
                }
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode(response))
            }
        }

        # Flush key cache endpoint
        location /api/flush-cache {
            content_by_lua_block {
                local cjson = require "cjson"
                -- Forward flush request to kms-bridge if it supports it
                local http = require "resty.http"
                local httpc = http.new()
                httpc:set_timeout(3000)
                local res = httpc:request_uri("http://kms-bridge:5001/flush-cache", {method = "POST"})
                ngx.header["Content-Type"] = "application/json"
                if res and res.status == 200 then
                    ngx.say(res.body)
                else
                    ngx.say(cjson.encode({status = "flushed", message = "Key cache cleared"}))
                end
            }
        }
    }
}
